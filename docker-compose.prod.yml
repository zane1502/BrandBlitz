# Production overrides: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

secrets:
  s3_secret_key:
    external: true    # create with: printf '<value>' | docker secret create s3_secret_key -
  minio_root_password:
    external: true    # create with: printf '<value>' | docker secret create minio_root_password -

services:
  postgres:
    restart: unless-stopped
    # No exposed port in prod — only internal network access

  redis:
    restart: unless-stopped

  minio:
    restart: unless-stopped
    command: server /data --console-address ":9001" --certs-dir /certs
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_OPTS: "--certs-dir /certs"
    volumes:
      - /etc/minio/certs:/certs:ro
    secrets:
      - minio_root_password

  minio-setup:
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    depends_on:
      minio:
        condition: service_healthy

  api:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      S3_ENDPOINT: ${S3_ENDPOINT:-https://minio:9000}
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_SECRET_KEY: ""
    secrets:
      - s3_secret_key
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512m

  worker:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      S3_ENDPOINT: ${S3_ENDPOINT:-https://minio:9000}
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_SECRET_KEY: ""
    secrets:
      - s3_secret_key
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256m

  web:
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256m

  nginx:
    restart: unless-stopped
    image: nginx:1.25-alpine
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/templates/nginx.prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
